<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visión Artificial</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Detector en Tiempo Real</h1>

    <div class="container">

        <!-- Cámara -->
        <img src="http://127.0.0.1:8000/video"
             alt="Video en tiempo real"
             class="video">

        <!-- Contenedor de tarjetas -->
        <div class="stats">

            <!-- Objetos -->
            <div class="card">
                <h2 id="objetos">0</h2>
                <p>Objetos detectados</p>
            </div>

            <!-- Personas -->
            <div class="card">
                <h2 id="personas">0</h2>
                <p>Personas detectadas</p>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
